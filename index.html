<script>
  const themeToggleBtn = document.getElementById("theme-toggle");
  const htmlElement = document.documentElement;

  themeToggleBtn.addEventListener("click", () => {
    htmlElement.classList.toggle("dark");
    localStorage.theme = htmlElement.classList.contains("dark")
      ? "dark"
      : "light";
  });

  function openLightbox(src, type) {
    const lightbox = document.getElementById("lightbox");
    const container = lightbox.querySelector("div");

    container.innerHTML = ""; // clear previous content

    if (type === "youtube") {
      container.innerHTML = `
        <iframe 
          class="w-full h-[80vh]"
          src="https://www.youtube.com/embed/${src}?autoplay=1&mute=0"
          frameborder="0"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      `;
    } 
    else if (type === "video") {
      container.innerHTML = `
        <video controls autoplay class="max-w-full max-h-[90vh] rounded-lg">
          <source src="${src}" type="video/mp4" />
        </video>
      `;
    }

    lightbox.classList.remove("hidden");
    lightbox.classList.add("flex");
    document.body.classList.add("modal-open");
  }

  function closeLightbox() {
    const lightbox = document.getElementById("lightbox");
    const container = lightbox.querySelector("div");

    container.innerHTML = ""; // stop video

    lightbox.classList.add("hidden");
    lightbox.classList.remove("flex");
    document.body.classList.remove("modal-open");
  }

  // ESC key support
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      closeLightbox();
    }
  });
</script>
